kind = "web"
previewPath = "/"
title = "World Cup 2026 Fixtures"
version = "1.0.0"
id = "artifacts/worldcup-fixtures"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18861

[services.development]
run = "pnpm --filter @workspace/worldcup-fixtures run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/worldcup-fixtures", "run", "build" ]
publicDir = "artifacts/worldcup-fixtures/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18861"
BASE_PATH = "/"
